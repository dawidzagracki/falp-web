server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Static assets — długi cache (Vite hashuje pliki)
    location ~* \.(?:js|css|woff2?|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    location ~* \.(?:jpg|jpeg|gif|png|webp|avif|svg|ico)$ {
        expires 6M;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # SEO files
    location = /robots.txt { access_log off; log_not_found off; }
    location = /sitemap.xml { access_log off; log_not_found off; }
    location = /favicon.svg { access_log off; log_not_found off; }
    location = /site.webmanifest { access_log off; log_not_found off; }

    # index.html — bez cache (deploy musi działać natychmiast)
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # SPA fallback — React Router obsługuje wszystkie /oferta/*, /blog/* itd.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Ukryj wersję nginx
    server_tokens off;

    # 404 fallback
    error_page 404 /index.html;
}
