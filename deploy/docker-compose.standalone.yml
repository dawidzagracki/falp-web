# TRYB B — strona pod http://IP:PORT (bez domeny, bez proxy).
# Port wybierasz zmienną FALP_PORT (domyślnie 8081), bo 80 zajmuje API.
# Pamiętaj otworzyć port w ufw:  sudo ufw allow <PORT>
# Uruchomienie na serwerze (z katalogu projektu):
#   FALP_PORT=8081 docker compose -f deploy/docker-compose.standalone.yml up -d --build
services:
  web:
    build:
      context: ..
      dockerfile: Dockerfile
    image: falp-web:latest
    container_name: falp-web
    restart: unless-stopped
    ports:
      - "${FALP_PORT:-8081}:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
