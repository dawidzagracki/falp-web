# TRYB B — najprościej: strona pod http://IP:8080 (bez domeny, bez proxy).
# Wymaga jednorazowo: sudo ufw allow 8080
# Uruchomienie na serwerze (z katalogu projektu):
#   docker compose -f deploy/docker-compose.standalone.yml up -d --build
services:
  web:
    build:
      context: ..
      dockerfile: Dockerfile
    image: falp-web:latest
    container_name: falp-web
    restart: unless-stopped
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
