# TRYB B — najprościej: strona pod http://IP (port 80, bez domeny, bez proxy).
# Port 80 jest już otwarty w ufw i nie podlega filtrowaniu OVH (inaczej niż 8080).
# Uwaga: port 80 musi być wolny (jeśli stoi tam Caddy/inny proxy -> użyj Trybu A).
# Uruchomienie na serwerze (z katalogu projektu):
#   docker compose -f deploy/docker-compose.standalone.yml up -d --build
services:
  web:
    build:
      context: ..
      dockerfile: Dockerfile
    image: falp-web:latest
    container_name: falp-web
    restart: unless-stopped
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
