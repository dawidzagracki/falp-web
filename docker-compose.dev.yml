# Dev mode — hot reload, kod montowany jako volume
# Użycie: docker compose -f docker-compose.dev.yml up
services:
  dev:
    image: node:22-alpine
    container_name: falp-event-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
