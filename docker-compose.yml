services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: falp-event:latest
    container_name: falp-event
    restart: unless-stopped
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
